<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cloudflare.com" />
    <title>Resultado da Comparação</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="header">
      <a href="index.html" class="back-link">
        <!-- Remova o texto longo e use apenas um ícone limpo com descrição se preferir -->
        <i class="fas fa-arrow-left"></i> Voltar para Upload
      </a>
      <h1>Notas Fiscais Faltando nas Entradas</h1>
      <div id="download-link-container"></div>
    </header>

    <main class="main">
      <section class="results">
        <div id="resumo-container"></div>
        <div id="acoes-container" class="acoes"></div>
        <div class="toolbar">
          <div class="filtro-box">
            <input
              type="text"
              id="filtroInput"
              placeholder="Buscar por número da nota ou fornecedor..."
            />
          </div>

          <div id="download-link-container"></div>
        </div>

        <div id="results-container"></div>
      </section>
    </main>

    <div id="modalManifestacao" class="modal">
      <div class="modal-content">
        <h2>Manifestar Notas</h2>

        <p id="quantidadeSelecionadas"></p>

        <div class="eventos">
          <label>
            <input type="radio" name="evento" value="ciencia" />
            Ciência da Operação
          </label>

          <label>
            <input type="radio" name="evento" value="confirmacao" />
            Confirmação da Operação
          </label>

          <label>
            <input type="radio" name="evento" value="desconhecimento" />
            Desconhecimento da Operação
          </label>

          <label>
            <input type="radio" name="evento" value="nao_realizada" />
            Operação Não Realizada
          </label>
        </div>

        <div class="modal-botoes">
          <button id="btnCancelarModal">Cancelar</button>
          <button id="btnConfirmarModal">Confirmar</button>
        </div>
      </div>
    </div>

    <script>
      const backendUrl = "http://localhost:8080";

      console.log(
        "resultadoComparacao:",
        localStorage.getItem("resultadoComparacao"),
      );

      const resultado = JSON.parse(
        localStorage.getItem("resultadoComparacao") || "{}",
      );

      const notas = resultado.notas || [];
      const resumo = resultado.resumo || {};

      const resultsContainer = document.getElementById("results-container");
      const downloadContainer = document.getElementById(
        "download-link-container",
      );

      const resumoContainer = document.getElementById("resumo-container");

      resumoContainer.innerHTML = `
<div class="cards-resumo">
    <div class="card-resumo total">
        <span>Total</span>
        <strong>${resumo.total || 0}</strong>
    </div>

    <div class="card-resumo recebidas">
        <span>Recebidas</span>
        <strong>${resumo.recebidas || 0}</strong>
    </div>

    <div class="card-resumo pendentes">
        <span>Pendentes</span>
        <strong>${resumo.pendentes || 0}</strong>
    </div>
</div>
`;

      const acoesContainer = document.getElementById("acoes-container");

      acoesContainer.innerHTML = `
<button id="btnTodas">Todas</button>
<button id="btnRecebidas">Recebidas</button>
<button id="btnPendentes">Pendentes</button>

<button id="btnManifestar">
  Manifestar Selecionadas
</button>
`;

      // Padroniza qualquer data do SIGA para DD/MM/AAAA
      function padronizarData(dataStr) {
        if (!dataStr) return "";

        const partes = dataStr.trim().split("/");
        if (partes.length !== 3) return dataStr;

        let [dia, mes, ano] = partes;

        dia = dia.padStart(2, "0");
        mes = mes.padStart(2, "0");

        if (ano.length === 2) {
          ano = "20" + ano;
        }

        return `${dia}/${mes}/${ano}`;
      }

      // Converte DD/MM/AAAA para AAAA-MM-DD para permitir ordenação lógica
      function converterParaOrdenacao(dataStr) {
        const dataPadrao = padronizarData(dataStr);
        const [dia, mes, ano] = dataPadrao.split("/");
        return `${ano}-${mes}-${dia}`;
      }

      if (notas.length > 0 && resultsContainer) {
        function renderizarTabela(listaNotas) {
          const notasOrdenadas = [...listaNotas].sort((a, b) => {
            if (a.recebida === b.recebida) {
              const itemA = converterParaOrdenacao(a.dataTempo);
              const itemB = converterParaOrdenacao(b.dataTempo);
              return itemA.localeCompare(itemB);
            }
            return a.recebida ? 1 : -1;
          });

          // ADICIONADO: Envelopando a tabela na div "table-container" para ativar o scroll do CSS
          let tableHTML = `
    <div class="table-container">
      <table class="table">
        <thead>
         <tr>
            <th><input type="checkbox" id="selecionarTodas"></th>
            <th>Status</th>
            <th>Data</th>
            <th>UF</th>
            <th>Documento</th>
            <th>Chave</th>
            <th>Fornecedor</th>
            <th>Situação</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody>
    `;

          notasOrdenadas.forEach((item) => {
            const dataFormatada = padronizarData(item.dataTempo);
            const status = item.recebida ? "✅ RECEBIDA" : "⚠️ PENDENTE";
            const classeLinha = item.recebida
              ? "linha-recebida"
              : "linha-pendente";

            tableHTML += `
         <tr class="${classeLinha}">
            <td><input type="checkbox" class="checkbox-nota" data-chave="${item.chave}"></td>
            <td><strong>${status}</strong></td> 
            <td>${dataFormatada}</td>
            <td>${item.uf || ""}</td>
            <td>${item.numDoc || ""}</td>
            <td>${item.chave || ""}</td>
            <td>${item.fornecedor || ""}</td>
            <td>${item.autorizacao || ""}</td>
            <td>${item.valorDoDoc || ""}</td>
          </tr>
      `;
          });

          tableHTML += `
        </tbody>
      </table>
    </div>
    `;

          resultsContainer.innerHTML = tableHTML;

          const selecionarTodas = document.getElementById("selecionarTodas");
          if (selecionarTodas) {
            selecionarTodas.addEventListener("change", () => {
              document
                .querySelectorAll(".checkbox-nota")
                .forEach((checkbox) => {
                  checkbox.checked = selecionarTodas.checked;
                });
            });
          }
        }

        renderizarTabela(notas);

        document.getElementById("btnTodas").addEventListener("click", () => {
          renderizarTabela(notas);
          if (filtroInput) filtroInput.value = ""; // Limpa o filtro ao mudar de aba
        });

        document
          .getElementById("btnRecebidas")
          .addEventListener("click", () => {
            renderizarTabela(notas.filter((n) => n.recebida));
            if (filtroInput) filtroInput.value = "";
          });

        document
          .getElementById("btnPendentes")
          .addEventListener("click", () => {
            renderizarTabela(notas.filter((n) => !n.recebida));
            if (filtroInput) filtroInput.value = "";
          });

        // CORREÇÃO DO FILTRO: Mapeamento exato dos índices das colunas (children)
        const filtroInput = document.getElementById("filtroInput");
        if (filtroInput) {
          filtroInput.addEventListener("input", function () {
            // Mudado de 'keyup' para 'input' para capturar colas do mouse
            const filtro = this.value.toLowerCase();
            const linhas = document.querySelectorAll("table tbody tr");

            linhas.forEach((linha) => {
              // Índices corretos baseados na estrutura de colunas atual da tabela:
              // [0]=Checkbox, [1]=Status, [2]=Data, [3]=UF, [4]=Documento, [5]=Chave, [6]=Fornecedor
              const numeroNota = linha.children[4].innerText.toLowerCase();
              const fornecedor = linha.children[6].innerText.toLowerCase();

              if (numeroNota.includes(filtro) || fornecedor.includes(filtro)) {
                linha.style.display = "";
              } else {
                linha.style.display = "none";
              }
            });
          });
        }

        document
          .getElementById("btnManifestar")
          .addEventListener("click", () => {
            const selecionadas = [];

            document
              .querySelectorAll(".checkbox-nota:checked")
              .forEach((checkbox) => {
                selecionadas.push(checkbox.dataset.chave);
              });

            if (selecionadas.length === 0) {
              alert("Selecione pelo menos uma nota.");
              return;
            }

            window.chavesSelecionadas = selecionadas;

            document.getElementById("quantidadeSelecionadas").textContent =
              `${selecionadas.length} notas selecionadas`;

            document.getElementById("modalManifestacao").style.display = "flex";
          });

        // DOWNLOAD EXCEL
        if (downloadContainer) {
          const downloadBtn = document.createElement("button");

          downloadBtn.classList.add("download-link");

          downloadBtn.innerHTML = `<i class="fas fa-download"></i> Baixar Excel`;

          downloadBtn.onclick = async () => {
            try {
              const notasFormatadas = notas.map((item) => ({
                ...item,
                dataTempo: padronizarData(item.dataTempo),
              }));

              const response = await fetch(`${backendUrl}/api/download-excel`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  chavesFaltando: notasFormatadas,
                }),
              });

              if (!response.ok) {
                throw new Error("Erro ao gerar Excel.");
              }

              const blob = await response.blob();

              const url = URL.createObjectURL(blob);

              const a = document.createElement("a");

              a.href = url;

              a.download = "notas_comparadas.xlsx";

              document.body.appendChild(a);

              a.click();

              a.remove();

              URL.revokeObjectURL(url);
            } catch (err) {
              alert(err.message);

              console.error(err);
            }
          };

          downloadContainer.appendChild(downloadBtn);
        }
      } else if (resultsContainer) {
        resultsContainer.innerHTML =
          "<p>Nenhuma diferença encontrada. Todas as chaves do Excel estão no PDF.</p>";
      }

      document
        .getElementById("btnCancelarModal")
        .addEventListener("click", () => {
          document.getElementById("modalManifestacao").style.display = "none";
        });

      document
        .getElementById("btnConfirmarModal")
        .addEventListener("click", async () => {
          const evento = document.querySelector('input[name="evento"]:checked');

          if (!evento) {
            alert("Selecione um evento.");
            return;
          }

          try {
            const response = await fetch(`${backendUrl}/api/manifestar`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                evento: evento.value,
                chaves: window.chavesSelecionadas,
              }),
            });

            const resultado = await response.json();

            if (!response.ok) {
              throw new Error(resultado.erro);
            }

            alert(resultado.mensagem);

            document.getElementById("modalManifestacao").style.display = "none";
          } catch (err) {
            console.error(err);

            alert("Erro: " + err.message);
          }
        });
    </script>
  </body>
</html>
